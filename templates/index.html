<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare - File Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>LocalShare</h1>
            <p>Upload and share files locally</p>
        </header>

        <div id="alert" class="alert"></div>

        <div class="card">
            <div id="dropZone" class="drop-zone">
                <div class="icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <p>Drag &amp; drop files here or click to browse</p>
                <p>Supports multiple files of any type</p>
            </div>
            <input type="file" id="fileInput" class="file-input" multiple>

            <div id="selectedFiles" class="selected-files">
                <h4>Selected Files</h4>
                <ul id="fileList" class="file-list"></ul>
            </div>

            <button type="button" id="uploadBtn" class="btn" disabled>
                <span>Upload Files</span>
                <span class="spinner"></span>
            </button>
        </div>

        <div class="card">
            <div class="files-header">
                <h2>Uploaded Files</h2>
            </div>
            <ul id="filesList" class="files-list">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>No files uploaded yet</p>
                </div>
            </ul>
        </div>
    </div>

    <script src="{{ url_for('static', filename='upload.js') }}"></script>
</body>
</html>
