<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare - File Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>LocalShare</h1>
        <p class="subtitle">Upload and share files locally</p>

        <div id="alert" class="alert"></div>

        <div class="upload-area">
            <div id="dropZone" class="drop-zone">
                <div class="icon">&#128193;</div>
                <p>Drag & drop files here or click to browse</p>
                <p>Supports multiple files</p>
            </div>
            <input type="file" id="fileInput" class="file-input" multiple>

            <div id="selectedFiles" class="selected-files">
                <h4>Selected Files:</h4>
                <ul id="fileList" class="file-list"></ul>
            </div>

            <div style="text-align: center;">
                <button id="uploadBtn" class="btn" disabled>
                    Upload Files
                    <span class="spinner"></span>
                </button>
            </div>
        </div>

        <div class="files-section">
            <h2>Uploaded Files</h2>
            <ul id="filesList" class="files-list">
                <div class="empty-state">Loading...</div>
            </ul>
        </div>
    </div>

    <script src="{{ url_for('static', filename='upload.js') }}"></script>
</body>
</html>
